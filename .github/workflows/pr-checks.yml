name: Mandatory Pull Request Checks

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Harden against transient crates.io network blips (a registry download EOF failed a
  # release PR's clippy, see #243): retry failed downloads and disable HTTP/2 multiplexing,
  # the source of intermittent "unexpected eof while reading" curl errors.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

# Every job runs a single `just` recipe so the exact command can be reproduced
# locally (see the Justfile / README "Development" section).
jobs:
  check-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Check Clippy
        run: just clippy

  check-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just, cargo-deny
        with:
          tool: just,cargo-deny
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Check Deny
        run: just deny

  check-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Doc
        run: just doc

  check-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - name: Check Rustfmt
        run: just fmt-check

  check-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Build
        run: just build

  check-proptest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just, nextest
        with:
          tool: just,nextest
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Property tests
        run: just proptest

  check-llms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # prevents the crates.io refetch that flaked, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"
      - name: Check llms.txt is in sync with the public API
        run: just check-llms
