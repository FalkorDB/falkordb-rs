name: Spellcheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  spellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spellcheck
        uses: rojopolis/spellcheck-github-actions@390a08ee9c46943112f21d2ff671649a2bacd33f # 0.62.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: Markdown

  # Spellcheck the pull-request title with the same wordlist/dictionary. The title becomes
  # the squashed-merge commit subject (git history) and its Conventional-Commit prefix drives
  # the release, so catch unknown words here at the source.
  pr-title:
    name: PR title spelling
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Write PR title to a Markdown file
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '# %s\n' "$PR_TITLE" > .pr-title.md
      - name: Spellcheck PR title
        uses: rojopolis/spellcheck-github-actions@390a08ee9c46943112f21d2ff671649a2bacd33f # 0.62.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: PRTitle
