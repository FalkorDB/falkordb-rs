version: 2
updates:
  # This is mostly for actions/checkout
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    # Conventional-Commit prefix so the PR title passes the `PR title format` gate (a bare
    # "Bump ..." title would fail it); `build` rides along with the next release.
    commit-message:
      prefix: "build"

  # This is actually for cargo crates
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    # Conventional-Commit prefix so the PR title passes the `PR title format` gate (a bare
    # "Bump ..." title would fail it); `build` rides along with the next release.
    commit-message:
      prefix: "build"