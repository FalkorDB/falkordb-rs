matrix:
- name: Markdown
  expect_match: false
  aspell:
    lang: en
    d: en_US
  dictionary:
    wordlists:
    - .github/wordlist.txt
    output: wordlist.dic
  pipeline:
  - pyspelling.filters.markdown:
      markdown_extensions:
      - markdown.extensions.extra:
  - pyspelling.filters.html:
      comments: false
      attributes:
      - alt
      ignores:
      - ':matches(code, pre)'
      - code
      - pre
      - blockquote
      - img
      - table
  sources:
  - '*.md'
  - 'docs/*.md'
  - 'llms.txt'
# PRTitle: spellcheck a single pull-request title (written to .pr-title.md by the
# `spellcheck-pr-title` just recipe / the Spellcheck workflow). PR titles become the
# squashed-merge commit subject (git history), so this keeps them typo-free at the source.
- name: PRTitle
  expect_match: false
  aspell:
    lang: en
    d: en_US
  dictionary:
    wordlists:
    - .github/wordlist.txt
    output: wordlist.dic
  pipeline:
  - pyspelling.filters.markdown:
      markdown_extensions:
      - markdown.extensions.extra:
  - pyspelling.filters.html:
      comments: false
      attributes:
      - alt
      ignores:
      - ':matches(code, pre)'
      - code
      - pre
      - blockquote
      - img
      - table
  sources:
  - '.pr-title.md'
