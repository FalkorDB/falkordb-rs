name: Spellcheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `edited` so fixing a PR title re-runs the title checks (spelling + Conventional-Commit format).
    types: [opened, synchronize, reopened, edited]
jobs:
  spellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spellcheck
        uses: rojopolis/spellcheck-github-actions@e619e00ca22f01ade9d73048dcd6518bedc552f2 # 0.63.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: Markdown

  # Spellcheck the blog ("Dev Log") posts with the same wordlist/dictionary.
  spellcheck-blog:
    name: Blog spelling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spellcheck blog posts
        uses: rojopolis/spellcheck-github-actions@e619e00ca22f01ade9d73048dcd6518bedc552f2 # 0.63.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: Blog

  # Spellcheck the pull-request title with the same wordlist/dictionary. The title becomes
  # the squashed-merge commit subject (git history) and its Conventional-Commit prefix drives
  # the release, so catch unknown words here at the source.
  pr-title:
    name: PR title spelling
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Write PR title to a Markdown file
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '# %s\n' "$PR_TITLE" > .pr-title.md
      - name: Spellcheck PR title
        uses: rojopolis/spellcheck-github-actions@e619e00ca22f01ade9d73048dcd6518bedc552f2 # 0.63.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: PRTitle

  # Validate that the pull-request title is a Conventional Commit whose type release-plz
  # recognizes. The title becomes the squash-merge subject and its prefix drives the release
  # (release_commits in release-plz.toml), so a malformed title silently skips the release — as
  # PR #297's "Fix spurious connection errors: ..." did. Runs the same `just check-pr-title`
  # recipe developers run locally, so CI and local stay identical.
  pr-title-format:
    name: PR title format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just
        with:
          tool: just
      - name: Check PR title is a Conventional Commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: just check-pr-title
